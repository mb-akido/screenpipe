# screenpipe - AI that knows everything you've seen, said, or heard
# https://screenpi.pe
#
# CI for the standalone SDK in sdk. It intentionally stays outside the root
# Cargo workspace so SDK releases and the core build remain independent.

name: SDK

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - "crates/screenpipe-a11y/**"
      - "crates/screenpipe-capture/**"
      - "crates/screenpipe-config/**"
      - "crates/screenpipe-connect/**"
      - "crates/screenpipe-core/**"
      - "crates/screenpipe-db/**"
      - "crates/screenpipe-events/**"
      - "crates/screenpipe-screen/**"
      - "crates/screenpipe-secrets/**"
      - "crates/screenpipe-sqlite-coordinator/**"
      - "crates/screenpipe-vault/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    paths:
      - "sdk/**"
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - "crates/screenpipe-a11y/**"
      - "crates/screenpipe-capture/**"
      - "crates/screenpipe-config/**"
      - "crates/screenpipe-connect/**"
      - "crates/screenpipe-core/**"
      - "crates/screenpipe-db/**"
      - "crates/screenpipe-events/**"
      - "crates/screenpipe-screen/**"
      - "crates/screenpipe-secrets/**"
      - "crates/screenpipe-sqlite-coordinator/**"
      - "crates/screenpipe-vault/**"
      - ".github/workflows/sdk.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.sha || github.ref }}
  # Same rule as ci.yml / style.yml / test-frontend.yml — cancel superseded
  # PR runs (saves minutes on rapid re-pushes); main pushes use per-commit
  # groups so they don't queue behind stale commits.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  cargo-test:
    name: cargo test ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: sdk-cargo-test-${{ matrix.settings.target }}
          workspaces: sdk -> target
          cache-bin: false
      - name: Test Rust library
        run: cargo test --locked --workspace --lib --target ${{ matrix.settings.target }}
      - name: Test SQLite runtime and coordinator
        run: cargo test --locked -p screenpipe-recorder --test sqlite_coordinator --target ${{ matrix.settings.target }}

  build:
    name: build ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 45
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: sdk-build-${{ matrix.settings.target }}
          workspaces: sdk -> target
          cache-bin: false
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build --target ${{ matrix.settings.target }} --cargo-flags="--locked"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bindings-${{ matrix.settings.target }}
          path: |
            sdk/*.node
            sdk/index.js
            sdk/index.d.ts
          if-no-files-found: error
          retention-days: 7

  test:
    name: integration ${{ matrix.host }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        host: [macos-latest, windows-latest]
    runs-on: ${{ matrix.host }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi
          ffmpeg -version | head -1
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress ffmpeg
          ffmpeg -version | Select-Object -First 1
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Download host-native binding
        uses: actions/download-artifact@v4
        with:
          name: sdk-bindings-${{ runner.os == 'macOS' && 'aarch64-apple-darwin' || 'x86_64-pc-windows-msvc' }}
          path: sdk
      - name: Show downloaded bindings
        shell: bash
        run: ls *.node
      - name: Run integration tests
        shell: bash
        env:
          # Keep Windows capture timing visible when the live FPS assertion regresses.
          SCREENPIPE_SDK_PERF: ${{ runner.os == 'Windows' && '1' || '0' }}
        run: |
          set -eo pipefail
          files=$(find __test__ -name '*.test.mjs' | sort)
          echo "running: $files"
          node --test --test-concurrency=1 $files

  # Validate the Swift package surface in the monorepo so `sdk` stays the
  # single source of truth: it must build + test green here BEFORE the
  # `swift-mirror` job in sdk-release.yml ever rsyncs it to the
  # screenpipe/screenpipe-sdk-swift publish repo. node is needed because the
  # transport tests spawn the bundled Node bridge as a subprocess.
  swift:
    name: swift build + test
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Show Swift version
        run: swift --version
      - name: Build Swift package
        run: swift build
      - name: Test Swift package
        # Skips one pre-existing timing-flaky test
        # (testNodeTransportDropsPartialOutputAfterBridgeExit): a dead bridge's
        # buffered stdout can be drained after process exit and contaminate the
        # restarted bridge. It passes locally but loses the race on CI runners.
        # Tracked separately to fix the NodeJSONLineTransport post-exit drain;
        # the other 20 tests (incl. the rest of the transport suite) run.
        run: swift test --skip testNodeTransportDropsPartialOutputAfterBridgeExit
