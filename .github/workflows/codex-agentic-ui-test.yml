name: Codex Agentic UI Test

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only validate planner/verdict wiring; skip the Codex Windows run."
        required: true
        type: boolean
        default: true
      base_ref:
        description: "Base ref for diff planning."
        required: false
        type: string
        default: origin/main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

env:
  AGENTIC_OUT_DIR: .agentic-ui

jobs:
  planner-smoke:
    name: Planner smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Generate agentic UI plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$AGENTIC_OUT_DIR"
          BASE_REF="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.base_ref || 'origin/main' }}"
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts plan \
            --base-ref "$BASE_REF" \
            --head-ref HEAD \
            --out "$AGENTIC_OUT_DIR/plan.json"

      - name: Generate dry-run verdict
        shell: bash
        run: |
          set -euo pipefail
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts dry-run \
            --plan "$AGENTIC_OUT_DIR/plan.json" \
            --out "$AGENTIC_OUT_DIR/verdict.json"
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts validate \
            --verdict "$AGENTIC_OUT_DIR/verdict.json"

      - name: Upload planner artifacts
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-agentic-ui-planner
          path: .agentic-ui
          if-no-files-found: ignore
          include-hidden-files: true

  windows-agentic-ui:
    name: Windows Codex agentic UI
    runs-on: windows-2022
    needs: planner-smoke
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_OPT_LEVEL: "0"
      CARGO_PROFILE_DEV_CODEGEN_UNITS: "256"
      CARGO_PROFILE_DEV_INCREMENTAL: "false"
      CARGO_PROFILE_DEV_DEBUG: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Generate agentic UI plan
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:AGENTIC_OUT_DIR | Out-Null
          $baseRef = "${{ inputs.base_ref || 'origin/main' }}"
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts plan `
            --base-ref "$baseRef" `
            --head-ref HEAD `
            --out "$env:AGENTIC_OUT_DIR/plan.json"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Windows build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/screenpipe-app-tauri/src-tauri/ffmpeg
            apps/screenpipe-app-tauri/src-tauri/vcredist
            apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.24.2
            apps/screenpipe-app-tauri/src-tauri/bun-x86_64-pc-windows-msvc.exe
          key: Windows-e2e-artifacts-v2-${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
          restore-keys: |
            Windows-e2e-artifacts-v2-

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          rustflags: ""
          target: x86_64-pc-windows-msvc
          cache-bin: false

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        shell: pwsh
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $env:GITHUB_ENV

      - name: Rust cache
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/screenpipe-app-tauri/src-tauri
          shared-key: screenpipe-tauri-e2e-windows
          cache-bin: false
          save-if: true

      - name: Configure Bun cache on same drive as workspace
        shell: pwsh
        run: |
          $drive = (Split-Path $env:GITHUB_WORKSPACE -Qualifier).TrimEnd(':')
          echo "BUN_INSTALL_CACHE_DIR=${drive}:/bun" >> $env:GITHUB_ENV
          echo "BUN_INSTALL_GLOBAL_DIR=${drive}:/bun-global" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: ./apps/screenpipe-app-tauri
        run: bun install --frozen-lockfile

      - name: Download ONNX Runtime for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip"
          $tauriDir = "apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.24.2"
          $ortDir = "ort-system-lib"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile "onnxruntime-win-x64-1.24.2.zip"
              break
            } catch {
              if ($attempt -eq 5) { throw }
              Write-Host "onnxruntime download failed on attempt $attempt; retrying..."
              Start-Sleep -Seconds (10 * $attempt)
            }
          }
          if (Test-Path $tauriDir) { Remove-Item $tauriDir -Recurse -Force }
          7z x onnxruntime-win-x64-1.24.2.zip -o"apps/screenpipe-app-tauri/src-tauri/" -y
          if (Test-Path $ortDir) { Remove-Item $ortDir -Recurse -Force }
          Copy-Item -Path $tauriDir -Destination $ortDir -Recurse -Force

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ./apps/screenpipe-app-tauri/.next
          key: ${{ runner.os }}-next-v2-${{ hashFiles('apps/screenpipe-app-tauri/package.json', 'apps/screenpipe-app-tauri/bun.lock', 'apps/screenpipe-app-tauri/next.config.mjs', 'apps/screenpipe-app-tauri/postcss.config.mjs', 'apps/screenpipe-app-tauri/app/**', 'apps/screenpipe-app-tauri/components/**', 'apps/screenpipe-app-tauri/lib/**', 'apps/screenpipe-app-tauri/styles/**') }}
          restore-keys: |
            ${{ runner.os }}-next-v2-

      - name: Build Windows debug app for E2E
        uses: tauri-apps/tauri-action@v0.5.17
        env:
          OPENBLAS_PATH: ${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/openblas
          NEXT_PUBLIC_SCREENPIPE_E2E: "true"
          NEXT_DISABLE_SOURCEMAPS: "1"
        with:
          args: "--no-sign --debug --no-bundle -- --features e2e"
          projectPath: "./apps/screenpipe-app-tauri"
          tauriScript: bunx tauri -v

      - name: Stage ONNX Runtime DLLs next to test binary
        shell: pwsh
        run: |
          $src = "${{ github.workspace }}/ort-system-lib/lib"
          $dst = "${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/target/debug"
          if (-not (Test-Path $dst)) {
            New-Item -ItemType Directory -Path $dst -Force | Out-Null
          }
          Get-ChildItem -Path $src -Filter "onnxruntime*.dll" | ForEach-Object {
            $dest = Join-Path $dst $_.Name
            if (Test-Path $dest) { Remove-Item -Path $dest -Force }
            [System.IO.File]::Copy($_.FullName, $dest, $true)
          }
          Get-ChildItem -Path $dst -Filter "onnxruntime*.dll" | ForEach-Object {
            if ($_.Length -eq 0) {
              throw "Staged DLL is 0 bytes: $($_.Name)"
            }
            Write-Host "$($_.Name)  $($_.Length) bytes"
          }

      - name: Install Codex CLI
        shell: pwsh
        run: npm install -g @openai/codex

      - name: Run Codex-driven Windows UI check
        shell: pwsh
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          $codex = (Get-Command codex.cmd -ErrorAction SilentlyContinue).Source
          if (-not $codex) {
            $codex = (Get-Command codex -ErrorAction Stop).Source
          }
          Get-Content -Raw .github/codex/prompts/agentic-ui-test.md | & $codex exec `
            --skip-git-repo-check `
            --cd "$PWD" `
            --output-last-message ".agentic-ui/verdict.json" `
            --output-schema ".github/codex/schemas/agentic-ui-verdict.schema.json" `
            --ephemeral `
            --ignore-user-config `
            --sandbox danger-full-access `
            -
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Validate Codex verdict
        shell: pwsh
        run: |
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts validate `
            --verdict "$env:AGENTIC_OUT_DIR/verdict.json"

      - name: Upload agentic UI artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-agentic-ui-windows
          path: .agentic-ui
          if-no-files-found: ignore
          include-hidden-files: true
