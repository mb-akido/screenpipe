name: Codex Agentic UI Test

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only validate planner/verdict wiring; skip the Codex Windows run."
        required: true
        type: boolean
        default: true
      base_ref:
        description: "Base ref for diff planning."
        required: false
        type: string
        default: origin/main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

env:
  AGENTIC_OUT_DIR: .agentic-ui

jobs:
  planner-smoke:
    name: Planner smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Generate agentic UI plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$AGENTIC_OUT_DIR"
          BASE_REF="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.base_ref || 'origin/main' }}"
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts plan \
            --base-ref "$BASE_REF" \
            --head-ref HEAD \
            --out "$AGENTIC_OUT_DIR/plan.json"

      - name: Generate dry-run verdict
        shell: bash
        run: |
          set -euo pipefail
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts dry-run \
            --plan "$AGENTIC_OUT_DIR/plan.json" \
            --out "$AGENTIC_OUT_DIR/verdict.json"
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts validate \
            --verdict "$AGENTIC_OUT_DIR/verdict.json"

      - name: Upload planner artifacts
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-agentic-ui-planner
          path: .agentic-ui
          if-no-files-found: ignore
          include-hidden-files: true

  windows-agentic-ui:
    name: Windows Codex agentic UI
    runs-on: windows-latest
    needs: planner-smoke
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Generate agentic UI plan
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:AGENTIC_OUT_DIR | Out-Null
          $baseRef = "${{ inputs.base_ref || 'origin/main' }}"
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts plan `
            --base-ref "$baseRef" `
            --head-ref HEAD `
            --out "$env:AGENTIC_OUT_DIR/plan.json"

      - name: Install Codex CLI
        shell: pwsh
        run: npm install -g @openai/codex

      - name: Run Codex-driven Windows UI check
        shell: pwsh
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          $codex = (Get-Command codex.cmd -ErrorAction SilentlyContinue).Source
          if (-not $codex) {
            $codex = (Get-Command codex -ErrorAction Stop).Source
          }
          Get-Content -Raw .github/codex/prompts/agentic-ui-test.md | & $codex exec `
            --skip-git-repo-check `
            --cd "$PWD" `
            --output-last-message ".agentic-ui/verdict.json" `
            --output-schema ".github/codex/schemas/agentic-ui-verdict.schema.json" `
            --ephemeral `
            --ignore-user-config `
            --sandbox danger-full-access `
            -
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Validate Codex verdict
        shell: pwsh
        run: |
          bun apps/screenpipe-app-tauri/e2e/agentic/cli.ts validate `
            --verdict "$env:AGENTIC_OUT_DIR/verdict.json"

      - name: Upload agentic UI artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-agentic-ui-windows
          path: .agentic-ui
          if-no-files-found: ignore
          include-hidden-files: true
