# LOCAL CI ONLY. Never use this configuration with --remote. Production already
# contains the historical schema without a matching migration ledger, so replaying
# this chain there would repeat ALTERs and attempt a known-expensive cost-log index.
name = "ai-proxy-historical-migrations-local-only"
compatibility_date = "2024-10-11"

[[d1_databases]]
binding = "HISTORICAL_DB"
database_name = "screenpipe-usage-historical-local-only"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
migrations_table = "d1_migrations"
